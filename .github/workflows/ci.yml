name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Get bun store path
        id: bun-cache
        shell: bash
        run: |
          echo "store_path=$(bun pm cache dir)" >> "$GITHUB_OUTPUT"

      - name: Restore Bun cache
        uses: actions/cache@v5
        id: bun-cache-restore
        with:
          path: |
            ${{ steps.bun-cache.outputs.store_path }}
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Restore node_modules
        uses: actions/cache@v5
        id: node-modules-restore
        with:
          path: |
            **/node_modules
            !**/node_modules/.cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-node-modules-

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore Prisma cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('**/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Install dependencies
        if: steps.node-modules-restore.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --filter=@zephyr/db db:generate

      - name: Check lint/format
        run: bun run check

      - name: Check types
        run: bun run check-types

      - name: Run unit tests
        run: bun run test:unit

      - name: Save Turbo cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}

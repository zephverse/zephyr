name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Get bun store path
        id: bun-cache
        shell: bash
        run: |
          echo "store_path=$(bun pm cache dir)" >> "$GITHUB_OUTPUT"

      - name: Restore Bun cache
        uses: actions/cache@v5
        id: bun-cache-restore
        with:
          path: |
            ${{ steps.bun-cache.outputs.store_path }}
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Restore node_modules
        uses: actions/cache@v5
        id: node-modules-restore
        with:
          path: |
            **/node_modules
            !**/node_modules/.cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lock') }}-${{
            hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-node-modules-

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore Prisma cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('**/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Install dependencies
        if: steps.node-modules-restore.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --filter=@zephyr/db db:generate

      - name: Check lint/format
        run: bun run check

      - name: Check types
        run: bun run check-types

      - name: Run unit tests
        run: bun run test:unit

  detect-pr-merge:
    name: Detect merged PR push
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.pr-check.outputs.should-build }}
      merge-pr-number: ${{ steps.pr-check.outputs.pr-number }}
    steps:
      - name: Check whether commit came from merged PR
        id: pr-check
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo
            const commit_sha = context.sha

            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha
            })

            const mergedPr = response.data.find((pr) => pr.merged_at && pr.base.ref === "main")

            core.setOutput("should-build", mergedPr ? "true" : "false")
            core.setOutput("pr-number", mergedPr ? String(mergedPr.number) : "")

            if (mergedPr) {
              core.info(`Detected merged PR #${mergedPr.number} for ${commit_sha}`)
            } else {
              core.info(`No merged PR associated with ${commit_sha}; skipping build.`)
            }

  determine-build-matrix:
    name: Determine changed app images
    needs:
      - quality
      - detect-pr-merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-pr-merge.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-apps.outputs.matrix }}
      has-app-changes: ${{ steps.changed-apps.outputs.has-app-changes }}
    steps:
      - name: Resolve changed apps from merged PR
        id: changed-apps
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo
            const prNumber = Number('${{ needs.detect-pr-merge.outputs.merge-pr-number }}')

            if (!prNumber) {
              core.setOutput('matrix', JSON.stringify({ include: [] }))
              core.setOutput('has-app-changes', 'false')
              core.info('No merged PR number found; skipping image build matrix.')
              return
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              },
            )

            const changedFiles = files.map((file) => file.filename)
            core.info(`Merged PR #${prNumber} changed ${changedFiles.length} files.`)

            const appEntries = [
              {
                app: 'web',
                dockerfile: './apps/web/Dockerfile',
                image: 'zephyr-web',
              },
              {
                app: 'auth',
                dockerfile: './apps/auth/Dockerfile',
                image: 'zephyr-auth',
              },
              {
                app: 'docs',
                dockerfile: './apps/docs/Dockerfile',
                image: 'zephyr-docs',
              },
            ]

            const triggerAllPrefixes = ['packages/', 'docker/']
            const triggerAllFiles = new Set(['bun.lock', 'package.json', 'turbo.json', 'tsconfig.json'])

            const shouldBuildAll = changedFiles.some((file) =>
              triggerAllPrefixes.some((prefix) => file.startsWith(prefix)) || triggerAllFiles.has(file),
            )

            const selectedApps = shouldBuildAll
              ? appEntries
              : appEntries.filter(({ app }) => changedFiles.some((file) => file.startsWith(`apps/${app}/`)))

            if (selectedApps.length === 0) {
              core.setOutput('matrix', JSON.stringify({ include: [] }))
              core.setOutput('has-app-changes', 'false')
              core.info(`No app-specific changes detected in PR #${prNumber}; skipping Docker builds.`)
              return
            }

            core.setOutput('matrix', JSON.stringify({ include: selectedApps }))
            core.setOutput('has-app-changes', 'true')
            core.info(`Selected Docker image builds: ${selectedApps.map(({ app }) => app).join(', ')}`)

  build-and-push:
    name: Build and Push (${{ matrix.app }})
    needs:
      - quality
      - detect-pr-merge
      - determine-build-matrix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-pr-merge.outputs.should-build == 'true' && needs.determine-build-matrix.outputs.has-app-changes == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.determine-build-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Print merged PR context
        run: |
          echo "Building Docker images for merged PR #${{ needs.detect-pr-merge.outputs.merge-pr-number }}"
          echo "Commit: ${{ github.sha }}"

      - name: Read app version metadata
        id: version
        shell: bash
        run: |
          APP_VERSION=$(jq -r '.version' "apps/${{ matrix.app }}/package.json")
          ROOT_VERSION=$(jq -r '.version' "package.json")

          {
            echo "app_version=${APP_VERSION}"
            echo "root_version=${ROOT_VERSION}"
            echo "tag_name=${{ matrix.app }}-v${APP_VERSION}"
            echo "sha_short=$(git rev-parse --short HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag_name }}
            type=sha,prefix=${{ matrix.app }}-sha-
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.zephyr.app=${{ matrix.app }}
            io.zephyr.app-version=${{ steps.version.outputs.app_version }}
            io.zephyr.root-version=${{ steps.version.outputs.root_version }}
            io.zephyr.pr-number=${{ needs.detect-pr-merge.outputs.merge-pr-number }}

      - name: Build and push Docker image (multi-arch)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resolve deploy targets
        id: deploy-targets
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_WEB_APP_ID: ${{ secrets.DOKPLOY_WEB_APP_ID }}
          DOKPLOY_AUTH_APP_ID: ${{ secrets.DOKPLOY_AUTH_APP_ID }}
          DOKPLOY_DOCS_APP_ID: ${{ secrets.DOKPLOY_DOCS_APP_ID }}
          WEB_HEALTH_URL: ${{ secrets.WEB_HEALTH_URL }}
          AUTH_HEALTH_URL: ${{ secrets.AUTH_HEALTH_URL }}
          DOCS_HEALTH_URL: ${{ secrets.DOCS_HEALTH_URL }}
        run: |
          app_id=""
          health_url=""
          health_initial_delay="30"
          health_retries="10"
          health_retry_interval="10"
          deploy_enabled="false"
          health_enabled="false"

          case "${{ matrix.app }}" in
            web)
              app_id="${DOKPLOY_WEB_APP_ID}"
              health_url="${WEB_HEALTH_URL}"
              ;;
            auth)
              app_id="${DOKPLOY_AUTH_APP_ID}"
              health_url="${AUTH_HEALTH_URL}"
              ;;
            docs)
              app_id="${DOKPLOY_DOCS_APP_ID}"
              health_url="${DOCS_HEALTH_URL}"
              health_initial_delay="60"
              health_retries="30"
              health_retry_interval="10"
              ;;
          esac

          if [ -n "${DOKPLOY_API_URL}" ] && [ -n "${DOKPLOY_API_TOKEN}" ] && [ -n "${app_id}" ]; then
            deploy_enabled="true"
          fi

          if [ -n "${health_url}" ]; then
            health_enabled="true"
          fi

          echo "app_id=${app_id}" >> "$GITHUB_OUTPUT"
          echo "health_url=${health_url}" >> "$GITHUB_OUTPUT"
          echo "health_initial_delay=${health_initial_delay}" >> "$GITHUB_OUTPUT"
          echo "health_retries=${health_retries}" >> "$GITHUB_OUTPUT"
          echo "health_retry_interval=${health_retry_interval}" >> "$GITHUB_OUTPUT"
          echo "deploy_enabled=${deploy_enabled}" >> "$GITHUB_OUTPUT"
          echo "health_enabled=${health_enabled}" >> "$GITHUB_OUTPUT"

      - name: Trigger Dokploy deployment via API
        if: success() && steps.deploy-targets.outputs.deploy_enabled == 'true'
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_APP_ID: ${{ steps.deploy-targets.outputs.app_id }}
        run: |
          API_URL="${DOKPLOY_API_URL%/}"

          curl -X 'POST' \
            "${API_URL}/api/application.deploy" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
            -d "{\"applicationId\":\"${DOKPLOY_APP_ID}\"}" \
            --fail --silent --show-error

      - name: Wait for deployment health check
        if: success() && steps.deploy-targets.outputs.health_enabled == 'true'
        env:
          HEALTH_URL: ${{ steps.deploy-targets.outputs.health_url }}
          HEALTH_INITIAL_DELAY: ${{ steps.deploy-targets.outputs.health_initial_delay }}
          HEALTH_RETRIES: ${{ steps.deploy-targets.outputs.health_retries }}
          HEALTH_RETRY_INTERVAL: ${{ steps.deploy-targets.outputs.health_retry_interval }}
        run: |
          echo "Waiting ${HEALTH_INITIAL_DELAY}s for container to start..."
          sleep "${HEALTH_INITIAL_DELAY}"

          echo "Checking health endpoint..."
          for i in $(seq 1 "${HEALTH_RETRIES}"); do
            if curl -sf "${HEALTH_URL}" > /dev/null; then
              echo "Health check passed!"
              exit 0
            fi

            echo "Attempt ${i}/${HEALTH_RETRIES} failed, retrying in ${HEALTH_RETRY_INTERVAL}s..."
            sleep "${HEALTH_RETRY_INTERVAL}"
          done

          echo "Health check failed after ${HEALTH_RETRIES} attempts"
          exit 1

  cleanup-old-images:
    name: Cleanup old GHCR images
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - zephyr-web
          - zephyr-auth
          - zephyr-docs
    steps:
      - name: Delete old package versions (keep last 10)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

  prisma-sync:
    name: Prisma safe sync
    needs:
      - build-and-push
      - detect-pr-merge
      - determine-build-matrix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-pr-merge.outputs.should-build == 'true' && needs.determine-build-matrix.outputs.has-app-changes == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Resolve whether Prisma sync should run
        id: resolve-prisma
        env:
          MATRIX_JSON: ${{ needs.determine-build-matrix.outputs.matrix }}
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_AUTH_APP_ID: ${{ secrets.DOKPLOY_AUTH_APP_ID }}
        run: |
          set -eu

          has_web_or_auth="false"
          if printf '%s' "$MATRIX_JSON" | jq -e '.include | any(.app == "web" or .app == "auth")' >/dev/null; then
            has_web_or_auth="true"
          fi

          run_enabled="false"
          if [ "$has_web_or_auth" = "true" ] && [ -n "$DOKPLOY_API_URL" ] && [ -n "$DOKPLOY_API_TOKEN" ] && [ -n "$DOKPLOY_AUTH_APP_ID" ]; then
            run_enabled="true"
          fi

          echo "run_enabled=${run_enabled}" >> "$GITHUB_OUTPUT"

      - name: Run Prisma migrate/safe sync via Dokploy
        if: steps.resolve-prisma.outputs.run_enabled == 'true'
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_AUTH_APP_ID: ${{ secrets.DOKPLOY_AUTH_APP_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -eu

          API_URL="${DOKPLOY_API_URL%/}"
          SCHEDULE_ID=""

          cleanup_schedule() {
            if [ -n "$SCHEDULE_ID" ]; then
              curl -sS -X 'POST' \
                "${API_URL}/api/schedule.delete" \
                -H 'accept: application/json' \
                -H 'Content-Type: application/json' \
                -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
                -d "{\"scheduleId\":\"${SCHEDULE_ID}\"}" >/dev/null || true
            fi
          }

          trap cleanup_schedule EXIT

          PRISMA_COMMAND="$(printf '%s\n' \
            'set -eu' \
            'cd /app' \
            '' \
            'SCHEMA_PATH="/app/packages/db/prisma/schema.prisma"' \
            'MIGRATIONS_PATH="/app/packages/db/prisma/migrations"' \
            'TEMP_CONFIG="/tmp/zephyr-prisma.config.ts"' \
            'DB_URL="${DATABASE_URL:-${POSTGRES_PRISMA_URL:-${POSTGRES_URL_NON_POOLING:-}}}"' \
            '' \
            'if [ -z "$DB_URL" ]; then' \
            '  echo "No database URL found in DATABASE_URL/POSTGRES_PRISMA_URL/POSTGRES_URL_NON_POOLING"' \
            '  exit 1' \
            'fi' \
            '' \
            'export DATABASE_URL="$DB_URL"' \
            '' \
            'cat > "$TEMP_CONFIG" <<EOF' \
            'import { defineConfig } from "prisma/config";' \
            'export default defineConfig({' \
            '  schema: "/app/packages/db/prisma/schema.prisma",' \
            '  migrations: { path: "/app/packages/db/prisma/migrations" },' \
            '  datasource: { url: process.env.DATABASE_URL ?? "" },' \
            '});' \
            'EOF' \
            '' \
            'echo "Applying committed Prisma migrations..."' \
            'bunx prisma migrate deploy --config "$TEMP_CONFIG"' \
            '' \
            'echo "Checking schema drift between DB and Prisma schema..."' \
            'set +e' \
            'bunx prisma migrate diff --from-config-datasource --to-schema "$SCHEMA_PATH" --config "$TEMP_CONFIG" --exit-code >/dev/null' \
            'diff_status=$?' \
            'set -e' \
            '' \
            'if [ "$diff_status" -eq 0 ]; then' \
            '  echo "No schema drift detected. Skipping schema sync."' \
            '  exit 0' \
            'fi' \
            '' \
            'if [ "$diff_status" -ne 2 ]; then' \
            '  echo "Prisma drift check failed with exit code ${diff_status}."' \
            '  exit "$diff_status"' \
            'fi' \
            '' \
            'echo "Schema drift detected. Attempting non-destructive sync with db push..."' \
            'bunx prisma db push --config "$TEMP_CONFIG"' \
            '' \
            'echo "Prisma safe sync completed."' \
          )"

          CREATE_PAYLOAD=$(jq -n \
            --arg name "zephyr-prisma-sync-${GITHUB_RUN_ID}" \
            --arg command "$PRISMA_COMMAND" \
            --arg appId "$DOKPLOY_AUTH_APP_ID" \
            '{
              name: $name,
              cronExpression: "0 0 1 1 *",
              scheduleType: "application",
              shellType: "sh",
              applicationId: $appId,
              enabled: false,
              command: $command
            }')

          CREATE_RESPONSE=$(curl -sS -X 'POST' \
            "${API_URL}/api/schedule.create" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
            --fail-with-body \
            -d "$CREATE_PAYLOAD")

          SCHEDULE_ID=$(printf '%s' "$CREATE_RESPONSE" | jq -r '.scheduleId // .id // .data.scheduleId // empty')

          if [ -z "$SCHEDULE_ID" ]; then
            echo "Failed to create Dokploy schedule for Prisma sync."
            printf '%s\n' "$CREATE_RESPONSE"
            exit 1
          fi

          RUN_RESPONSE_FILE=$(mktemp)
          RUN_STATUS=$(curl -sS -o "$RUN_RESPONSE_FILE" -w "%{http_code}" -X 'POST' \
            "${API_URL}/api/schedule.runManually" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
            -d "{\"scheduleId\":\"${SCHEDULE_ID}\"}")

          RUN_RESPONSE=$(cat "$RUN_RESPONSE_FILE")
          rm -f "$RUN_RESPONSE_FILE"

          if [ "$RUN_STATUS" -ge 400 ]; then
            echo "Dokploy schedule run request failed with HTTP ${RUN_STATUS}"
            printf '%s\n' "$RUN_RESPONSE"
            exit 1
          fi

          RUN_ERROR_CODE=$(printf '%s' "$RUN_RESPONSE" | jq -r 'if type == "object" then (.code // .data.code // empty) else empty end' 2>/dev/null || true)

          if [ -n "$RUN_ERROR_CODE" ]; then
            echo "Dokploy schedule run failed with code: ${RUN_ERROR_CODE}"
            printf '%s\n' "$RUN_RESPONSE"
            exit 1
          fi

          printf '%s\n' "$RUN_RESPONSE"

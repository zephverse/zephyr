name: zephdev

services:
  postgres-dev:
    container_name: zephdb
    image: postgres:18.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zephyr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    command: >
      postgres -c listen_addresses='*' -c max_connections=50 -c
      shared_buffers=128MB -c work_mem=4MB -c maintenance_work_mem=32MB -c
      effective_cache_size=256MB -c wal_level=replica -c max_wal_senders=4 -c
      log_statement=none -c timezone=UTC
    networks:
      - dev_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d zephyr" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-init:
    profiles: [ "init" ]
    container_name: zephdev-db-init
    image: postgres:18.3
    environment:
      PGPASSWORD: postgres
    networks:
      - dev_network
    depends_on:
      postgres-dev:
        condition: service_healthy
    command: >
      sh -c '
        echo "Initializing PostgreSQL extensions..." &&
        psql -h postgres-dev -U postgres -d zephyr -c "
          CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
          CREATE EXTENSION IF NOT EXISTS \"pgcrypto\";
          CREATE EXTENSION IF NOT EXISTS \"pg_stat_statements\";
          ALTER DATABASE zephyr SET timezone TO '\''UTC'\'';
        " &&
        echo "PostgreSQL initialization complete!"
      '

  prisma-migrate:
    profiles: [ "init" ]
    container_name: zephdev-schema-init
    build:
      context: ..
      dockerfile: docker/prisma.dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-dev:5432/zephyr?schema=public
    networks:
      - dev_network
    depends_on:
      postgres-dev:
        condition: service_healthy
    command:
      [
        "/usr/local/bin/prisma-bootstrap.sh",
      ]

  prisma-studio:
    profiles: [ "studio", "init" ]
    container_name: zephdev-prisma-studio
    build:
      context: ..
      dockerfile: docker/prisma.dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-dev:5432/zephyr?schema=public
    ports:
      - "5555:5555"
    networks:
      - dev_network
    depends_on:
      postgres-dev:
        condition: service_healthy
    command:
      [
        "/usr/local/bin/prisma-studio.sh",
      ]
    restart: unless-stopped

  redis-dev:
    container_name: zephdev-redis
    image: redis:8.6.2
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server --requirepass zephyrredis --maxmemory 256mb
      --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
      --loglevel notice --save 900 1
    volumes:
      - redis_data_dev:/data
    networks:
      - dev_network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "zephyrredis", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  redis-insight:
    profiles: [ "studio" ]
    container_name: zephdev-redis-insight
    image: redislabs/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis-dev
      - RI_REDIS_PORT=6379
      - RI_REDIS_PASSWORD=zephyrredis
      - RI_REDIS_ALIAS=Zephyr Redis Dev
    volumes:
      - redisinsight:/data
    networks:
      - dev_network
    depends_on:
      redis-dev:
        condition: service_healthy
    restart: unless-stopped

  zephob-dev:
    container_name: zephdev-zephob
    image: rustfs/rustfs:latest
    ports:
      - "9090:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${ZEPHOB_ROOT_USER:-zephob-admin}
      RUSTFS_SECRET_KEY: ${ZEPHOB_ROOT_PASSWORD:-zephob-admin}
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_REGION: ${ZEPHOB_REGION:-ap-south-1}
    volumes:
      - zephob_data_dev:/data
    networks:
      - dev_network
    command: rustfs --address 0.0.0.0:9000 /data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9000 >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  zephob-init:
    profiles: [ "init" ]
    container_name: zephdev-zephob-init
    image: amazon/aws-cli:2.17.53
    depends_on:
      zephob-dev:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${ZEPHOB_ROOT_USER:-zephob-admin}
      AWS_SECRET_ACCESS_KEY: ${ZEPHOB_ROOT_PASSWORD:-zephob-admin}
      AWS_DEFAULT_REGION: ${ZEPHOB_REGION:-ap-south-1}
      ZEPHOB_ENDPOINT: http://zephob-dev:9000
    networks:
      - dev_network
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo 'Creating object storage buckets...'
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api create-bucket --bucket uploads || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api create-bucket --bucket avatars || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api create-bucket --bucket temp || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api create-bucket --bucket backups || true

        echo 'Setting bucket policies...'
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-policy --bucket uploads --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::uploads/*"}]}' || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-policy --bucket avatars --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::avatars/*"}]}' || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-policy --bucket temp --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::temp/*"}]}' || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-policy --bucket backups --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::backups/*"}]}' || true

        echo 'Enabling versioning...'
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-versioning --bucket uploads --versioning-configuration Status=Enabled || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-versioning --bucket avatars --versioning-configuration Status=Enabled || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-versioning --bucket temp --versioning-configuration Status=Enabled || true
        aws --endpoint-url "$$ZEPHOB_ENDPOINT" s3api put-bucket-versioning --bucket backups --versioning-configuration Status=Enabled || true

        echo 'Object storage initialization complete!'

  rabbitmq-dev:
    container_name: zephdev-rabbitmq
    image: rabbitmq:4.2.5
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - dev_network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  meilisearch-dev:
    container_name: zephdev-meilisearch
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey123
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilisearch_data_dev:/meili_data
    networks:
      - dev_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  meilisearch-init:
    profiles: [ "init" ]
    container_name: zephdev-meilisearch-init
    build:
      context: ..
      dockerfile: docker/prisma.dockerfile
    environment:
      MEILISEARCH_URL: http://meilisearch-dev:7700
      MEILISEARCH_MASTER_KEY: masterKey123
      DATABASE_URL: postgresql://postgres:postgres@postgres-dev:5432/zephyr?schema=public
    networks:
      - dev_network
    depends_on:
      meilisearch-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
    command:
      [
        "/usr/local/bin/meilisearch-init.sh",
      ]

  timescaledb-dev:
    container_name: zephdev-timescaledb
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zephyr-logs
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data_dev:/var/lib/postgresql/data
    command: >
      postgres -c listen_addresses='*' -c max_connections=50 -c
      shared_buffers=128MB -c work_mem=4MB -c maintenance_work_mem=32MB -c
      effective_cache_size=256MB -c wal_level=replica -c max_wal_senders=4 -c
      log_statement=none -c timezone=UTC
    networks:
      - dev_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d zephyr-logs" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  dev_network:
    driver: bridge
    name: zephdev-network

volumes:
  postgres_data_dev:
    name: zephdev-postgres18-data
  redis_data_dev:
    name: zephdev-redis-data
  zephob_data_dev:
    name: zephdev-zephob-data
  redisinsight:
    name: zephdev-redisinsight-data
  rabbitmq_data_dev:
    name: zephdev-rabbitmq-data
  meilisearch_data_dev:
    name: zephdev-meilisearch-data
  timescaledb_data_dev:
    name: zephdev-timescaledb-data
